<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash {
            text-align: center;
            animation: fadeInScale 1.2s ease-out;
        }

        .icon {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
            animation: float 2s ease-in-out infinite;
        }

        h1 {
            font-size: 48px;
            color: #1a237e;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        p {
            color: #0d1642;
            font-size: 16px;
            letter-spacing: 1px;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <img src="assets/icon.png" alt="Nimbus" class="icon">
        <h1>NIMBUS</h1>
        <p>Cloud Storage Manager</p>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 5000);
    </script>
</body>
</html>
