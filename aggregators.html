<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Агрегаторы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('assets/icon-background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }
        .back-icon {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 40px;
        }
        .back-icon:hover { transform: scale(1.05); }
        .columns-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            gap: 20px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .aggregator-icon {
            width: 100px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .aggregator-icon:hover { transform: scale(1.05); }
        @media (max-width: 600px) {
            .back-icon { width: 150px; }
            .aggregator-icon { width: 70px; }
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="assets/cloud-icon1.png" alt="Back" class="back-icon" id="backIcon">
        <div class="columns-container">
            <div class="column">
                <img src="assets/cloud-icon-google.png" alt="Google Drive" class="aggregator-icon" id="googleIcon">
                <img src="assets/cloud-icon-yandex.png" alt="Yandex Disk" class="aggregator-icon" id="yandexIcon">
            </div>
            <div class="column">
                <img src="assets/cloud-icon1.png" alt="Aggregator 2" class="aggregator-icon" id="agg2">
                <img src="assets/cloud-icon1.png" alt="Aggregator 4" class="aggregator-icon" id="agg4">
            </div>
        </div>
    </div>
    <div id="loading" style="display: none;" class="loading">Авторизация...</div>

    <script>
        // === НАСТРОЙКИ GOOGLE OAUTH ===
        const CLIENT_ID = '944030768816-3e8d7vrpgio1qgsfd4jgljevjldmin62.apps.googleusercontent.com';
        const REDIRECT_URI = encodeURIComponent('https://poserval.github.io/Nimbus/aggregators.html');
        const AUTH_URL = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=https://www.googleapis.com/auth/drive.file&access_type=offline&prompt=consent`;
        
        const PROXY_URL = 'https://oauth-proxy.cyclic.app/token';

        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }

        async function exchangeCodeForToken(code) {
            showLoading();
            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, provider: 'google' })
                });
                const data = await response.json();
                if (data.access_token) {
                    const userInfo = await fetch('https://www.googleapis.com/oauth2/v1/userinfo?alt=json', {
                        headers: { Authorization: `Bearer ${data.access_token}` }
                    });
                    const user = await userInfo.json();
                    window.location.href = `storage.html?token=${data.access_token}&email=${encodeURIComponent(user.email)}`;
                } else {
                    alert('Ошибка: ' + (data.error || 'не удалось получить токен'));
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (err) {
                alert('Ошибка соединения: ' + err.message);
                document.getElementById('loading').style.display = 'none';
            }
        }

        function startGoogleAuth() {
            sessionStorage.setItem('google_auth_started', 'true');
            window.location.href = AUTH_URL;
        }

        function handleGoogleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                window.history.replaceState({}, document.title, window.location.pathname);
                exchangeCodeForToken(code);
            } else if (sessionStorage.getItem('google_auth_started')) {
                sessionStorage.removeItem('google_auth_started');
                alert('Авторизация не завершена или отменена');
            }
        }

        // === ОБРАБОТЧИКИ ===
        document.getElementById('backIcon').onclick = () => {
            window.location.href = 'home.html';
        };
        document.getElementById('googleIcon').onclick = startGoogleAuth;
        document.getElementById('yandexIcon').onclick = () => {
            alert('Яндекс Диск появится в следующей версии. Следите за обновлениями!');
        };
        document.getElementById('agg2').onclick = () => alert('Агрегатор 2 будет добавлен позже');
        document.getElementById('agg4').onclick = () => alert('Агрегатор 4 будет добавлен позже');

        handleGoogleRedirect();
    </script>
</body>
</html>
