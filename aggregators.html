<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Агрегаторы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('assets/icon-background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        /* Белый полупрозрачный слой (осветление 0.7) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }

        /* Контент поверх слоя */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        /* Стиль для верхней иконки (возврат на главный экран) */
        .back-icon {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
            margin-bottom: 40px;
        }

        .back-icon:hover {
            transform: scale(1.05);
        }

        /* Контейнер для двух колонок */
        .columns-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            gap: 20px;
        }

        /* Левая и правая колонки */
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Стиль для маленьких иконок */
        .aggregator-icon {
            width: 100px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
        }

        .aggregator-icon:hover {
            transform: scale(1.05);
        }

        /* Убираем выделение у всех элементов */
        .content * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 600px) {
            .back-icon {
                width: 150px;
            }
            .aggregator-icon {
                width: 70px;
            }
            .columns-container {
                gap: 15px;
            }
            .column {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <!-- Иконка возврата на главный экран -->
        <img src="assets/cloud-icon1.png" alt="Back" class="back-icon" id="backIcon">

        <!-- Две колонки: левая и правая -->
        <div class="columns-container">
            <!-- Левая колонка -->
            <div class="column">
                <img src="assets/cloud-icon-google.png" alt="Google Drive" class="aggregator-icon" id="agg1">
                <img src="assets/cloud-icon-yandex.png" alt="Yandex Disk" class="aggregator-icon" id="agg3">
            </div>

            <!-- Правая колонка -->
            <div class="column">
                <img src="assets/cloud-icon1.png" alt="Aggregator 2" class="aggregator-icon" id="agg2">
                <img src="assets/cloud-icon1.png" alt="Aggregator 4" class="aggregator-icon" id="agg4">
            </div>
        </div>
    </div>

    <script>
        // Возврат на главный экран
        const backIcon = document.getElementById('backIcon');
        backIcon.addEventListener('click', () => {
            window.location.href = 'home.html';
        });

        // Обработчики для иконок агрегаторов
        const agg1 = document.getElementById('agg1');
        const agg2 = document.getElementById('agg2');
        const agg3 = document.getElementById('agg3');
        const agg4 = document.getElementById('agg4');

        agg1.addEventListener('click', () => {
            alert('Google Drive\nФункционал будет добавлен позже');
        });

        agg2.addEventListener('click', () => {
            alert('Агрегатор 2\nФункционал будет добавлен позже');
        });

        agg3.addEventListener('click', () => {
            alert('Яндекс Диск\nФункционал будет добавлен позже');
        });

        agg4.addEventListener('click', () => {
            alert('Агрегатор 4\nФункционал будет добавлен позже');
        });
    </script>
</body>
</html>
