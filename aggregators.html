<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Агрегаторы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('assets/icon-background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }
        .back-icon {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
            margin-bottom: 40px;
        }
        .back-icon:hover { transform: scale(1.05); }
        .columns-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            gap: 20px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .aggregator-icon {
            width: 100px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
        }
        .aggregator-icon:hover { transform: scale(1.05); }
        @media (max-width: 600px) {
            .back-icon { width: 150px; }
            .aggregator-icon { width: 70px; }
            .columns-container { gap: 15px; }
            .column { gap: 20px; }
        }
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
        }
        .popup-content input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }
        .popup-content button {
            background: #1a237e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="assets/cloud-icon1.png" alt="Back" class="back-icon" id="backIcon">
        <div class="columns-container">
            <div class="column">
                <img src="assets/cloud-icon-google.png" alt="Google Drive" class="aggregator-icon" id="googleIcon">
                <img src="assets/cloud-icon-yandex.png" alt="Yandex Disk" class="aggregator-icon" id="yandexIcon">
            </div>
            <div class="column">
                <img src="assets/cloud-icon1.png" alt="Aggregator 2" class="aggregator-icon" id="agg2">
                <img src="assets/cloud-icon1.png" alt="Aggregator 4" class="aggregator-icon" id="agg4">
            </div>
        </div>
    </div>

    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
    <script>
        // === НАСТРОЙКИ AUTH0 ===
        // (Замени на свои данные после создания приложения)
        const AUTH0_DOMAIN = 'YOUR_AUTH0_DOMAIN'; // например, dev-abc123.us.auth0.com
        const AUTH0_CLIENT_ID = 'YOUR_AUTH0_CLIENT_ID';

        let auth0Client = null;

        async function initAuth0() {
            auth0Client = await createAuth0Client({
                domain: AUTH0_DOMAIN,
                clientId: AUTH0_CLIENT_ID,
                authorizationParams: {
                    redirect_uri: window.location.origin + '/aggregators.html',
                    scope: 'openid profile email'
                }
            });
        }

        // === ХРАНИЛИЩЕ ===
        let accounts = JSON.parse(localStorage.getItem('nimbus_accounts') || '[]');

        function saveAccounts() {
            localStorage.setItem('nimbus_accounts', JSON.stringify(accounts));
        }

        function showNamePopup(accessToken, userInfo) {
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.innerHTML = `
                <div class="popup-content">
                    <h3>Название аккаунта</h3>
                    <input type="text" id="accountName" placeholder="Например: Google (рабочий)" value="${userInfo.email.split('@')[0]}">
                    <button id="saveNameBtn">Сохранить</button>
                </div>
            `;
            document.body.appendChild(popup);

            document.getElementById('saveNameBtn').onclick = () => {
                const name = document.getElementById('accountName').value.trim() || userInfo.email;
                accounts.push({
                    id: Date.now(),
                    service: 'google',
                    name: name,
                    accessToken: accessToken,
                    email: userInfo.email
                });
                saveAccounts();
                popup.remove();
                alert('Аккаунт добавлен! Перейдите на главный экран.');
            };
        }

        async function startGoogleAuth() {
            if (!auth0Client) await initAuth0();
            await auth0Client.loginWithPopup();
            const token = await auth0Client.getTokenSilently();
            const user = await auth0Client.getUser();
            showNamePopup(token, user);
        }

        // === ОБРАБОТЧИКИ ===
        document.getElementById('backIcon').onclick = () => {
            window.location.href = 'home.html';
        };
        document.getElementById('googleIcon').onclick = startGoogleAuth;
        document.getElementById('yandexIcon').onclick = () => alert('Яндекс Диск будет добавлен позже');
        document.getElementById('agg2').onclick = () => alert('Агрегатор 2 будет добавлен позже');
        document.getElementById('agg4').onclick = () => alert('Агрегатор 4 будет добавлен позже');

        // Инициализация
        initAuth0();
    </script>
</body>
</html>
