<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Агрегаторы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('assets/icon-background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }
        .back-icon {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 40px;
        }
        .back-icon:hover { transform: scale(1.05); }
        .columns-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            gap: 20px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .aggregator-icon {
            width: 100px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .aggregator-icon:hover { transform: scale(1.05); }
        @media (max-width: 600px) {
            .back-icon { width: 150px; }
            .aggregator-icon { width: 70px; }
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="assets/cloud-icon1.png" alt="Back" class="back-icon" id="backIcon">
        <div class="columns-container">
            <div class="column">
                <img src="assets/cloud-icon-google.png" alt="Google Drive" class="aggregator-icon" id="googleIcon">
                <img src="assets/cloud-icon-yandex.png" alt="Yandex Disk" class="aggregator-icon" id="yandexIcon">
            </div>
            <div class="column">
                <img src="assets/cloud-icon1.png" alt="Aggregator 2" class="aggregator-icon" id="agg2">
                <img src="assets/cloud-icon1.png" alt="Aggregator 4" class="aggregator-icon" id="agg4">
            </div>
        </div>
    </div>

    <script>
        document.getElementById('backIcon').onclick = () => {
            window.location.href = 'home.html';
        };
        document.getElementById('googleIcon').onclick = () => {
            alert('Авторизация Google будет добавлена в следующей версии');
        };
        document.getElementById('yandexIcon').onclick = () => {
            alert('Яндекс Диск будет добавлен позже');
        };
        document.getElementById('agg2').onclick = () => alert('Агрегатор 2 будет добавлен позже');
        document.getElementById('agg4').onclick = () => alert('Агрегатор 4 будет добавлен позже');
    </script>
</body>
</html>
