<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Агрегаторы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('assets/icon-background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        /* Белый полупрозрачный слой (осветление 0.7) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }

        /* Контент поверх слоя */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }

        /* Убираем все выделения при нажатии */
        .aggregator-icon {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
        }

        .aggregator-icon:hover {
            transform: scale(1.05);
        }

        /* Убираем выделение у родительского элемента */
        .content * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="assets/cloud-icon1.png" alt="Aggregators" class="aggregator-icon" id="aggregatorIcon">
    </div>

    <script>
        const aggregatorIcon = document.getElementById('aggregatorIcon');
        aggregatorIcon.addEventListener('click', () => {
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
