<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Агрегаторы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('assets/icon-background.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }
        .back-icon {
            width: 200px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 40px;
        }
        .back-icon:hover { transform: scale(1.05); }
        .columns-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            gap: 20px;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .aggregator-icon {
            width: 100px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .aggregator-icon:hover { transform: scale(1.05); }
        @media (max-width: 600px) {
            .back-icon { width: 150px; }
            .aggregator-icon { width: 70px; }
        }
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
        }
        .popup-content input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }
        .popup-content button {
            background: #1a237e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="assets/cloud-icon1.png" alt="Back" class="back-icon" id="backIcon">
        <div class="columns-container">
            <div class="column">
                <img src="assets/cloud-icon-google.png" alt="Google Drive" class="aggregator-icon" id="googleIcon">
                <img src="assets/cloud-icon-yandex.png" alt="Yandex Disk" class="aggregator-icon" id="yandexIcon">
            </div>
            <div class="column">
                <img src="assets/cloud-icon1.png" alt="Aggregator 2" class="aggregator-icon" id="agg2">
                <img src="assets/cloud-icon1.png" alt="Aggregator 4" class="aggregator-icon" id="agg4">
            </div>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ GOOGLE OAUTH ===
        const CLIENT_ID = '944030768816-3e8d7vrpgio1qgsfd4jgljevjldmin62.apps.googleusercontent.com';
        const REDIRECT_URI = encodeURIComponent('https://poserval.github.io/Nimbus/aggregators.html');
        const AUTH_URL = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=https://www.googleapis.com/auth/drive.readonly&access_type=offline`;

        // === ХРАНИЛИЩЕ ===
        let accounts = JSON.parse(localStorage.getItem('nimbus_accounts') || '[]');

        function saveAccounts() {
            localStorage.setItem('nimbus_accounts', JSON.stringify(accounts));
        }

        function showNamePopup(accessToken, email) {
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.innerHTML = `
                <div class="popup-content">
                    <h3>Название аккаунта</h3>
                    <input type="text" id="accountName" placeholder="Например: Google (рабочий)" value="${email.split('@')[0]}">
                    <button id="saveNameBtn">Сохранить</button>
                </div>
            `;
            document.body.appendChild(popup);

            document.getElementById('saveNameBtn').onclick = () => {
                const name = document.getElementById('accountName').value.trim() || email;
                accounts.push({
                    id: Date.now(),
                    service: 'google',
                    name: name,
                    accessToken: accessToken,
                    email: email
                });
                saveAccounts();
                popup.remove();
                alert('Аккаунт добавлен! Перейдите на главный экран.');
            };
        }

        async function exchangeCodeForToken(code) {
            // Публичный прокси для обмена кода на токен
            const proxyUrl = 'https://oauth-proxy.vercel.app/token';
            try {
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, provider: 'google' })
                });
                const data = await response.json();
                if (data.access_token) {
                    // Получаем email пользователя
                    const userInfo = await fetch('https://www.googleapis.com/oauth2/v1/userinfo?alt=json', {
                        headers: { Authorization: `Bearer ${data.access_token}` }
                    });
                    const user = await userInfo.json();
                    showNamePopup(data.access_token, user.email);
                } else {
                    alert('Ошибка получения токена: ' + (data.error || 'неизвестная ошибка'));
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            }
        }

        function startGoogleAuth() {
            const authWindow = window.open(AUTH_URL, 'googleAuth', 'width=500,height=600');
            window.addEventListener('message', async (event) => {
                if (event.data && event.data.code) {
                    await exchangeCodeForToken(event.data.code);
                    if (authWindow) authWindow.close();
                }
            });
        }

        function handleGoogleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                window.history.replaceState({}, document.title, window.location.pathname);
                exchangeCodeForToken(code);
            }
        }

        // === ОБРАБОТЧИКИ ===
        document.getElementById('backIcon').onclick = () => {
            window.location.href = 'home.html';
        };
        document.getElementById('googleIcon').onclick = startGoogleAuth;
        document.getElementById('yandexIcon').onclick = () => alert('Яндекс Диск будет добавлен позже');
        document.getElementById('agg2').onclick = () => alert('Агрегатор 2 будет добавлен позже');
        document.getElementById('agg4').onclick = () => alert('Агрегатор 4 будет добавлен позже');

        // Проверяем, не вернулись ли мы с code
        handleGoogleRedirect();
    </script>
</body>
</html>
