<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Файлы (Демо)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #1a237e;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .back-btn, .upload-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
        }
        .upload-btn {
            font-size: 20px;
            width: auto;
            padding: 0 16px;
            border-radius: 20px;
        }
        .title { font-size: 18px; font-weight: bold; }
        .done-btn {
            background: #4caf50;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .content { padding: 20px; }
        .name-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .file-list {
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        .file-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .file-icon { font-size: 28px; margin-right: 15px; }
        .file-info { flex: 1; }
        .file-name { font-size: 16px; font-weight: 500; }
        .file-size { font-size: 12px; color: #666; }
        .empty { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" id="backBtn">←</button>
        <span class="title" id="headerTitle">Демо: Google Drive</span>
        <button class="upload-btn" id="uploadBtn">📤 Загрузить</button>
        <button class="done-btn" id="doneBtn">Готово</button>
    </div>
    <div class="content">
        <input type="text" class="name-input" id="accountName" placeholder="Название аккаунта (например: Google рабочий)">
        <div id="fileList" class="file-list"></div>
    </div>

    <script>
        // Демо-данные
        const demoFiles = [
            { name: 'Отчет за март.pdf', size: 245, mimeType: 'application/pdf' },
            { name: 'Фото отпуска.jpg', size: 1280, mimeType: 'image/jpeg' },
            { name: 'Проект Nimbus.zip', size: 5120, mimeType: 'application/zip' },
            { name: 'Презентация.pptx', size: 890, mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' },
            { name: 'Документ.docx', size: 67, mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' }
        ];

            const container = document.getElementById('fileList');
            container.innerHTML = demoFiles.map(file => `
                <div class="file-item">
                    <div class="file-icon">${file.mimeType.includes('image') ? '🖼️' : file.mimeType.includes('pdf') ? '📑' : file.mimeType.includes('zip') ? '📦
