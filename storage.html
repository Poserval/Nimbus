<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Файлы (Демо)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #1a237e;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .back-btn, .upload-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
        }
        .upload-btn {
            font-size: 20px;
            width: auto;
            padding: 0 16px;
            border-radius: 20px;
        }
        .title { font-size: 18px; font-weight: bold; }
        .done-btn {
            background: #4caf50;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .content { padding: 20px; }
        .name-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .file-list {
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        .file-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .file-icon { font-size: 28px; margin-right: 15px; }
        .file-info { flex: 1; }
        .file-name { font-size: 16px; font-weight: 500; }
        .file-size { font-size: 12px; color: #666; }
        .empty { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" id="backBtn">←</button>
        <span class="title" id="headerTitle">Демо: Google Drive</span>
        <button class="upload-btn" id="uploadBtn">📤 Загрузить</button>
        <button class="done-btn" id="doneBtn">Готово</button>
    </div>
    <div class="content">
        <input type="text" class="name-input" id="accountName" placeholder="Название аккаунта (например: Google рабочий)">
        <div id="fileList" class="file-list"></div>
    </div>

    <script>
        // Демо-данные
        const demoFiles = [
            { name: 'Отчет за март.pdf', size: 245, mimeType: 'application/pdf' },
            { name: 'Фото отпуска.jpg', size: 1280, mimeType: 'image/jpeg' },
            { name: 'Проект Nimbus.zip', size: 5120, mimeType: 'application/zip' },
            { name: 'Презентация.pptx', size: 890, mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' },
            { name: 'Документ.docx', size: 67, mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' }
        ];

        function loadDemoFiles() {
            const container = document.getElementById('fileList');
            container.innerHTML = demoFiles.map(file => `
                <div class="file-item">
                    <div class="file-icon">${file.mimeType.includes('image') ? '🖼️' : file.mimeType.includes('pdf') ? '📑' : file.mimeType.includes('zip') ? '📦' : '📄'}</div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-size">${Math.round(file.size)} KB</div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function saveAndGoHome() {
            const name = document.getElementById('accountName').value.trim();
            if (!name) {
                alert('Введите название аккаунта');
                return;
            }
            
            // Сохраняем тестовый аккаунт
            const accounts = JSON.parse(localStorage.getItem('nimbus_accounts') || '[]');
            accounts.push({
                id: Date.now(),
                service: 'google',
                name: name,
                accessToken: 'demo_token',
                email: 'demo@example.com'
            });
            localStorage.setItem('nimbus_accounts', JSON.stringify(accounts));
            localStorage.setItem('nimbus_accounts_updated', Date.now().toString());
            window.location.href = 'home.html';
        }

        document.getElementById('backBtn').onclick = () => {
            window.location.href = 'aggregators.html';
        };
        document.getElementById('doneBtn').onclick = saveAndGoHome;
        document.getElementById('uploadBtn').onclick = () => {
            alert('В демо-режиме загрузка файлов недоступна. В боевой версии здесь будет загрузка на Google Drive.');
        };

        loadDemoFiles();
    </script>
</body>
</html>
