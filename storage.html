<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nimbus - Файлы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #1a237e;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
        }
        .done-btn {
            background: #4caf50;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .content {
            padding: 20px;
        }
        .name-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .file-list {
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        .file-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .file-icon {
            font-size: 28px;
            margin-right: 15px;
        }
        .file-info {
            flex: 1;
        }
        .file-name {
            font-size: 16px;
            font-weight: 500;
        }
        .file-size {
            font-size: 12px;
            color: #666;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" id="backBtn">←</button>
        <span class="title" id="headerTitle">Google Drive</span>
        <button class="done-btn" id="doneBtn">Готово</button>
    </div>
    <div class="content">
        <input type="text" class="name-input" id="accountName" placeholder="Название аккаунта (например: Google рабочий)">
        <div id="fileList" class="file-list">
            <div class="loading">Загрузка файлов...</div>
        </div>
    </div>

    <script>
        // Получаем данные из URL
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get('token');
        const email = urlParams.get('email');

        if (!accessToken) {
            alert('Ошибка: токен не найден');
            window.location.href = 'aggregators.html';
        }

        // Загружаем файлы из Google Drive
        async function loadFiles() {
            try {
                const response = await fetch('https://www.googleapis.com/drive/v3/files?fields=files(id,name,size,mimeType)', {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });
                const data = await response.json();
                const container = document.getElementById('fileList');
                
                if (!data.files || data.files.length === 0) {
                    container.innerHTML = '<div class="empty">Файлы не найдены</div>';
                    return;
                }
                
                container.innerHTML = data.files.slice(0, 20).map(file => `
                    <div class="file-item">
                        <div class="file-icon">${file.mimeType.includes('folder') ? '📁' : '📄'}</div>
                        <div class="file-info">
                            <div class="file-name">${escapeHtml(file.name)}</div>
                            <div class="file-size">${file.size ? Math.round(file.size/1024) + ' KB' : '—'}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('fileList').innerHTML = '<div class="empty">Ошибка загрузки файлов</div>';
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Сохраняем аккаунт и возвращаемся на главный экран
        function saveAndGoHome() {
            const name = document.getElementById('accountName').value.trim();
            if (!name) {
                alert('Введите название аккаунта');
                return;
            }
            
            const accounts = JSON.parse(localStorage.getItem('nimbus_accounts') || '[]');
            accounts.push({
                id: Date.now(),
                service: 'google',
                name: name,
                accessToken: accessToken,
                email: email
            });
            localStorage.setItem('nimbus_accounts', JSON.stringify(accounts));
            localStorage.setItem('nimbus_accounts_updated', Date.now().toString());
            window.location.href = 'home.html';
        }

        // Обработчики
        document.getElementById('backBtn').onclick = () => {
            window.location.href = 'aggregators.html';
        };
        document.getElementById('doneBtn').onclick = saveAndGoHome;

        // Загружаем файлы
        loadFiles();
    </script>
</body>
</html>
